services:
  - type: web
    name: smart-investor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --worker-class gthread --workers 2 --threads 8 --timeout 300
    envVars:
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: RENDER
        value: "true"
      - key: FLASK_DEBUG
        value: "false"
